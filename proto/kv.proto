syntax = "proto3";

package kvraft.kv.v1;

option java_package = "com.kvraft.kv.v1";
option java_multiple_files = true;
option java_outer_classname = "KvProto";
option go_package = "kvraft/pb;kvpb";

enum Status {
  STATUS_UNSPECIFIED = 0;
  OK = 1;
  ERR_NO_KEY = 2;
  ERR_VERSION = 3;
  ERR_WRONG_LEADER = 4;
  ERR_MAYBE = 5;
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  Status status = 1;
  string value = 2;
  uint64 version = 3;
  int32 leader_hint = 4;
}

message PutRequest {
  string key = 1;
  string value = 2;
  uint64 version = 3;
}

message PutResponse {
  Status status = 1;
  int32 leader_hint = 2;
}

service KV {
  rpc Get(GetRequest) returns (GetResponse);
  rpc Put(PutRequest) returns (PutResponse);
}
